server:
  port: ${PORT:8080}

spring:
  application:
    name: wordle
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

wordle:
  # Comma-separated list of origins allowed to call the API (frontend URL(s))
  allowed-origins: ${WORDLE_ALLOWED_ORIGINS:http://localhost:5173}
  max-guesses: 6
  word-length: 5
  # Fixed epoch date used to derive the daily word index. Do not change once live,
  # or previously-played "days" will shuffle to different words.
  epoch-date: ${WORDLE_EPOCH_DATE:2024-01-01}
  # Fixed shuffle seed so the daily word order is stable across restarts but not
  # simply alphabetical (the source answer list is alphabetically sorted).
  shuffle-seed: ${WORDLE_SHUFFLE_SEED:20240101}
  # External dictionary API used for the post-game "what does this word mean"
  # lookup. Free, no API key required. This isn't on any gameplay-critical path -
  # see DictionaryService for why that matters.
  dictionary-api-base-url: ${WORDLE_DICTIONARY_API_URL:https://api.dictionaryapi.dev/api/v2/entries/en}
  # How long an idle game session / Endless shuffle-bag lives in Redis before
  # expiring - bounds storage growth since there are no accounts to tie cleanup to.
  session-ttl: ${WORDLE_SESSION_TTL:2d}
  bag-ttl: ${WORDLE_BAG_TTL:30d}

management:
  endpoints:
    web:
      exposure:
        include: health,info
